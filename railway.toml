[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "python -c \"import os; from uvicorn import run; run('backend.app.main:app', host='0.0.0.0', port=int(os.getenv('PORT', '8000')))\""
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
